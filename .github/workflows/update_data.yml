name: Mise à jour quotidienne des données PEA

on:
  schedule:
    # GitHub Actions utilise l'heure UTC. Paris = UTC+2 en été (CEST), UTC+1
    # en hiver (CET). On programme donc deux horaires pour couvrir 18h30
    # heure de Paris toute l'année (l'un des deux ne déclenchera rien d'utile
    # selon la saison, ce qui est sans conséquence : le script est idempotent).
    - cron: "30 16 * * 1-5"   # 18h30 Paris en été (CEST)
    - cron: "30 17 * * 1-5"   # 18h30 Paris en hiver (CET)
  workflow_dispatch: {}        # permet aussi un déclenchement manuel

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Exécution du scan quotidien
        run: python scripts/daily_update.py

      - name: Commit et push des résultats
        run: |
          git config user.name "pea-scanner-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Mise à jour des données PEA - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
